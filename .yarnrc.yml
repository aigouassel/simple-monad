# Patch third-party manifests that declare peer deps they don't pull in.
# Under PnP's strict resolution, ts-jest's unmet `jest-util` peer is a hard
# error; declaring it as a dependency of ts-jest resolves it cleanly without
# adding jest-util to our own dependencies.
packageExtensions:
  "ts-jest@*":
    dependencies:
      jest-util: "*"
