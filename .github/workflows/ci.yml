name: CI

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # First set up Node so Corepack is available...
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # ...then enable Corepack, which pins Yarn to the version in package.json
      # ("packageManager"). This must run BEFORE any `yarn` invocation — including
      # setup-node's own cache lookup below — otherwise the runner's preinstalled
      # Yarn 1.22 runs first and aborts on the `packageManager` mismatch.
      - name: Enable Corepack
        run: corepack enable

      # Re-run setup-node now that `yarn` resolves to v4, so its cache lookup uses
      # the right Yarn and the global Yarn cache is restored between runs.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      # --immutable fails if installing would change yarn.lock, guaranteeing
      # the committed lockfile is complete and in sync with package.json.
      - name: Install
        run: yarn install --immutable

      - name: Lint & format check
        run: yarn lint

      - name: Build
        run: yarn build

      # test:coverage (not plain `test`) so the 100% coverageThreshold in
      # jest.config.cjs is enforced — `yarn test` alone never checks coverage.
      - name: Test (with coverage)
        run: yarn test:coverage

      # Build dist and run every examples/*.ts. They are not part of any tsconfig,
      # so executing them is the only guard against example drift; the `examples`
      # script runs under `set -e`, so a single broken example fails the job.
      - name: Examples
        run: yarn examples

  deploy-docs:
    # Publish the TypeDoc API site to GitHub Pages — only on pushes to main
    # (the workflow already only triggers on main), and only once `check` is
    # green so we never publish docs that don't build.
    needs: check
    runs-on: ubuntu-latest
    # Scoped to this job only (least privilege): the Pages deploy needs to write
    # Pages and mint an OIDC token so deploy-pages can prove the artifact came
    # from this workflow run. The check job keeps the default read-only token.
    permissions:
      pages: write
      id-token: write
    # One in-flight Pages deploy at a time; never cancel a running publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Same Corepack dance as the check job: set up Node, enable Corepack so
      # `yarn` resolves to v4, then re-run setup-node to wire up the Yarn cache.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install
        run: yarn install --immutable

      # Emits the static site to ./docs (treatWarningsAsErrors is on, so a
      # missing doc or broken link fails here rather than publishing silently).
      - name: Build docs
        run: yarn docs

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
